<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Low-volatility portfolio chart with candlesticks and NAV line">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0c1226"/>
      <stop offset="1" stop-color="#070b18"/>
    </linearGradient>
    <linearGradient id="nav" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#bg)"/>

  <!-- gridlines (full width; safe to crop at edges) -->
  <g stroke="#1e2742" stroke-width="1">
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="220" x2="1200" y2="220"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="520" x2="1200" y2="520"/>
  </g>

  <!-- header tag (kept inside the 16:10 safe area) -->
  <text x="150" y="62" fill="#6b7aa0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20" letter-spacing="3">PORTFOLIO NAV · 1-WEEK HOLD</text>

  <!-- price labels, top-right clear band, right-aligned & inset -->
  <g fill="#5f6f93" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="22" text-anchor="end">
    <text x="1040" y="128">$1.04M</text>
    <text x="1040" y="228">$1.02M</text>
  </g>

  <!-- candlesticks -->
  <g>
    <g stroke="#34d399" fill="#34d399"><line x1="90" y1="412" x2="90" y2="448" stroke-width="2"/><rect x="81" y="421" width="18" height="18" rx="2"/></g>
    <g stroke="#34d399" fill="#34d399"><line x1="150" y1="407" x2="150" y2="443" stroke-width="2"/><rect x="141" y="416" width="18" height="18" rx="2"/></g>
    <g stroke="#fb7185" fill="#fb7185"><line x1="210" y1="413" x2="210" y2="449" stroke-width="2"/><rect x="201" y="422" width="18" height="18" rx="2"/></g>
    <g stroke="#34d399" fill="#34d399"><line x1="270" y1="400" x2="270" y2="436" stroke-width="2"/><rect x="261" y="409" width="18" height="18" rx="2"/></g>
    <g stroke="#34d399" fill="#34d399"><line x1="330" y1="403" x2="330" y2="439" stroke-width="2"/><rect x="321" y="412" width="18" height="18" rx="2"/></g>
    <g stroke="#fb7185" fill="#fb7185"><line x1="390" y1="390" x2="390" y2="426" stroke-width="2"/><rect x="381" y="399" width="18" height="18" rx="2"/></g>
    <g stroke="#34d399" fill="#34d399"><line x1="450" y1="394" x2="450" y2="430" stroke-width="2"/><rect x="441" y="403" width="18" height="18" rx="2"/></g>
    <g stroke="#34d399" fill="#34d399"><line x1="510" y1="381" x2="510" y2="417" stroke-width="2"/><rect x="501" y="390" width="18" height="18" rx="2"/></g>
    <g stroke="#fb7185" fill="#fb7185"><line x1="570" y1="384" x2="570" y2="420" stroke-width="2"/><rect x="561" y="393" width="18" height="18" rx="2"/></g>
    <g stroke="#34d399" fill="#34d399"><line x1="630" y1="370" x2="630" y2="406" stroke-width="2"/><rect x="621" y="379" width="18" height="18" rx="2"/></g>
    <g stroke="#34d399" fill="#34d399"><line x1="690" y1="374" x2="690" y2="410" stroke-width="2"/><rect x="681" y="383" width="18" height="18" rx="2"/></g>
    <g stroke="#fb7185" fill="#fb7185"><line x1="750" y1="361" x2="750" y2="397" stroke-width="2"/><rect x="741" y="370" width="18" height="18" rx="2"/></g>
    <g stroke="#34d399" fill="#34d399"><line x1="810" y1="365" x2="810" y2="401" stroke-width="2"/><rect x="801" y="374" width="18" height="18" rx="2"/></g>
    <g stroke="#34d399" fill="#34d399"><line x1="870" y1="351" x2="870" y2="387" stroke-width="2"/><rect x="861" y="360" width="18" height="18" rx="2"/></g>
    <g stroke="#fb7185" fill="#fb7185"><line x1="930" y1="354" x2="930" y2="390" stroke-width="2"/><rect x="921" y="363" width="18" height="18" rx="2"/></g>
    <g stroke="#34d399" fill="#34d399"><line x1="990" y1="342" x2="990" y2="378" stroke-width="2"/><rect x="981" y="351" width="18" height="18" rx="2"/></g>
    <g stroke="#34d399" fill="#34d399"><line x1="1050" y1="345" x2="1050" y2="381" stroke-width="2"/><rect x="1041" y="354" width="18" height="18" rx="2"/></g>
    <g stroke="#fb7185" fill="#fb7185"><line x1="1110" y1="333" x2="1110" y2="369" stroke-width="2"/><rect x="1101" y="342" width="18" height="18" rx="2"/></g>
  </g>

  <!-- NAV line riding over the candles -->
  <polyline fill="none" stroke="url(#nav)" stroke-width="3.5" stroke-linejoin="round" stroke-linecap="round"
    points="90,416 150,411 210,417 270,404 330,407 390,394 450,398 510,385 570,388 630,374 690,378 750,365 810,369 870,355 930,358 990,346 1050,349 1110,337"/>
  <g fill="#22d3ee">
    <circle cx="90" cy="416" r="4"/>
    <circle cx="1110" cy="337" r="5"/>
  </g>
</svg>
