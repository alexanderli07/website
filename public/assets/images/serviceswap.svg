<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" preserveAspectRatio="xMidYMid slice" role="img" aria-label="ServiceSwap logo — two arrows swapping">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c1430"/>
      <stop offset="1" stop-color="#080d1c"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="36%" r="42%">
      <stop offset="0" stop-color="#2dd4bf" stop-opacity="0.22"/>
      <stop offset="0.55" stop-color="#6366f1" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#bg)"/>
  <rect width="1200" height="600" fill="url(#glow)"/>

  <!-- emblem backdrop -->
  <circle cx="600" cy="215" r="120" fill="#0e1a33" stroke="#22324f" stroke-width="1.5"/>

  <!-- top arrow: points right (teal) -->
  <g stroke="#2dd4bf" stroke-width="24" stroke-linecap="round">
    <line x1="520" y1="180" x2="652" y2="180"/>
  </g>
  <path d="M690 180 L652 158 L652 202 Z" fill="#2dd4bf"/>

  <!-- bottom arrow: points left (violet) -->
  <g stroke="#a78bfa" stroke-width="24" stroke-linecap="round">
    <line x1="680" y1="250" x2="548" y2="250"/>
  </g>
  <path d="M510 250 L548 228 L548 272 Z" fill="#a78bfa"/>

  <!-- wordmark -->
  <text x="600" y="412" text-anchor="middle" font-family="Segoe UI, system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="800" font-size="78" letter-spacing="-1">
    <tspan fill="#e7ecff">Service</tspan><tspan fill="#2dd4bf">Swap</tspan>
  </text>

  <!-- tagline -->
  <text x="600" y="462" text-anchor="middle" font-family="Segoe UI, system-ui, -apple-system, Helvetica, Arial, sans-serif" font-weight="500" font-size="28" letter-spacing="3" fill="#8b97c0">TRADE SKILLS — NOT CASH</text>
</svg>
